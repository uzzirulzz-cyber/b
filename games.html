<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white">
    <!-- Header -->
    <header class="bg-gray-800 py-4">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-2xl font-bold text-purple-400">GameHub</h1>
            <nav>
                <a href="index.html" class="text-white hover:text-purple-400 mx-2">Home</a>
                <a href="games.html" class="text-white hover:text-purple-400 mx-2">Games</a>
            </nav>
        </div>
    </header>

    <!-- Games Listing -->
    <section class="py-16">
        <div class="container mx-auto px-4">
            <div class="flex">
                <!-- Sidebar Filters -->
                <aside class="w-1/4 pr-8">
                    <h3 class="text-xl font-bold mb-4">Filters</h3>
                    <div class="mb-4">
                        <label class="block mb-2">Price Range</label>
                        <input type="range" min="0" max="100" class="w-full">
                    </div>
                    <div class="mb-4">
                        <label class="block mb-2">Genre</label>
                        <select class="w-full bg-gray-800 text-white p-2 rounded">
                            <option>All</option>
                            <option>Action</option>
                            <option>Adventure</option>
                            <option>RPG</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block mb-2">Platform</label>
                        <select class="w-full bg-gray-800 text-white p-2 rounded">
                            <option>All</option>
                            <option>PC</option>
                            <option>PS5</option>
                            <option>Xbox</option>
                        </select>
                    </div>
                </aside>

                <!-- Games Grid -->
                <main class="w-3/4">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-bold">All Games</h2>
                        <select class="bg-gray-800 text-white p-2 rounded">
                            <option>Latest</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                            <option>Popularity</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="games-grid">
                        <!-- Games will be loaded here -->
                    </div>
                </main>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 py-8">
        <div class="container mx-auto text-center px-4">
            <p>&copy; 2023 GameHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
